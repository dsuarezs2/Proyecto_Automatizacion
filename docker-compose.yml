version: "3.8"

services:
  techserv:
    build: .
    container_name: techserv-server
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: techserv-ngrok
    restart: unless-stopped
    command:
      - "http"
      - "techserv:8080"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"
    depends_on:
      - techserv
